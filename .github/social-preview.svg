        fill="#f5bde6">feeds.json で設定</text>

  <text x="640" y="595"
        text-anchor="middle"
        font-family="'Courier New', Consolas, monospace"
        font-size="20" fill="#6e738d">github.com/572nacchan/announce-poster</text>
