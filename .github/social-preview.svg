  <rect x="515" y="510" width="65" height="30" rx="15" fill="#363a4f"/>
  <text x="548" y="530" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15"
        fill="#8aadf4">OSS</text>

  <rect x="595" y="510" width="90" height="30" rx="15" fill="#363a4f"/>
  <text x="640" y="530" text-anchor="middle"
